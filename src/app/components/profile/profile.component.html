<article
	class="team-card flex h-full max-w-full items-start gap-4 rounded-[var(--radius-card)] border border-[var(--c-border)] bg-[var(--c-bg-glass)] p-4 shadow-[var(--shadow-sm)] transition duration-200 sm:gap-5 sm:p-5"
>
	<div
		class="team-avatar aspect-square h-20 w-20 shrink-0 self-start overflow-hidden border border-[var(--c-border-soft)] bg-[var(--c-bg-soft)] sm:h-[5.5rem] sm:w-[5.5rem]"
	>
		<img
			[ngSrc]="profile().image"
			width="640"
			height="640"
			[alt]="profile().name"
			class="h-full w-full object-cover"
		/>
	</div>

	<div class="flex min-w-0 flex-1 flex-col pt-1">
		<div class="flex min-w-0 flex-col gap-2">
			<div class="min-w-0">
				<h3 class="min-w-0 text-lg font-semibold leading-tight text-[var(--c-text-secondary)]">
					{{ profile().name }}
				</h3>

				<span
					class="mt-2 inline-flex w-fit items-center gap-1.5 rounded-full border border-[var(--c-border-soft)] bg-[var(--c-bg-secondary)] px-2.5 py-1 text-[11px] font-semibold uppercase leading-none tracking-[0.08em] text-[var(--c-text-muted)]"
				>
					<span class="material-symbols-outlined text-[15px]" aria-hidden="true">
						{{ locationIcon() }}
					</span>
					{{ locationLabel() | translate }}
				</span>
			</div>

			<p class="mt-1 text-sm font-medium leading-5 text-[var(--c-secondary)]">
				{{ profile().seniority | translate | titlecase }}
			</p>
		</div>

		<div class="mt-3 flex flex-wrap items-center gap-2">
			@for (social of visibleSocials(); track social.href) {
				<a
					class="team-social inline-flex h-8 w-8 items-center justify-center rounded-[var(--radius-xs)] border border-[var(--c-border-soft)] bg-[var(--c-bg-glass)] text-[var(--c-text-muted)] opacity-70 transition duration-200 hover:border-[var(--c-border-strong)] hover:text-[var(--c-secondary)] hover:opacity-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[color:var(--c-secondary)] focus-visible:ring-offset-2 focus-visible:ring-offset-[var(--c-bg-secondary)]"
					[href]="social.href"
					[attr.target]="social.external ? '_blank' : null"
					[attr.rel]="social.external ? 'noopener noreferrer' : null"
					[attr.aria-label]="profile().name + ' ' + (social.label | translate)"
				>
					<svg class="h-4 w-4" viewBox="0 0 24 24" aria-hidden="true">
						@switch (social.icon) {
							@case ('linkedin') {
								<path
									fill="currentColor"
									d="M6.94 8.98H3.78V20h3.16V8.98ZM5.36 4a1.84 1.84 0 1 0 0 3.68 1.84 1.84 0 0 0 0-3.68Zm14.86 9.74c0-2.96-1.58-4.34-3.7-4.34a3.19 3.19 0 0 0-2.88 1.58h-.04v-2h-3.03V20h3.15v-5.45c0-1.44.27-2.83 2.05-2.83 1.76 0 1.78 1.65 1.78 2.92V20h3.16v-6.26Z"
								/>
							}
							@case ('github') {
								<path
									fill="currentColor"
									d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.2-3.37-1.2-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.56-1.11-4.56-4.94 0-1.09.39-1.99 1.03-2.69-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.03A9.56 9.56 0 0 1 12 6.98c.85 0 1.7.11 2.5.33 1.91-1.3 2.75-1.03 2.75-1.03.55 1.38.2 2.4.1 2.65.64.7 1.03 1.6 1.03 2.69 0 3.84-2.34 4.69-4.57 4.93.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10 10 0 0 0 12 2Z"
								/>
							}
							@case ('instagram') {
								<path
									fill="currentColor"
									d="M7.8 2h8.4A5.8 5.8 0 0 1 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8A5.8 5.8 0 0 1 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2Zm0 2A3.8 3.8 0 0 0 4 7.8v8.4A3.8 3.8 0 0 0 7.8 20h8.4a3.8 3.8 0 0 0 3.8-3.8V7.8A3.8 3.8 0 0 0 16.2 4H7.8Zm8.95 1.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"
								/>
							}
							@default {
								<path
									fill="currentColor"
									d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm0 3.2V17h16V8.2l-7.38 5.12a1.1 1.1 0 0 1-1.24 0L4 8.2Zm.9-1.2L12 11.93 19.1 7H4.9Z"
								/>
							}
						}
					</svg>
				</a>
			}
		</div>
	</div>
</article>
