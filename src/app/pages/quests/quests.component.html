<main class="mx-auto max-w-[var(--container)] px-3 pb-8 pt-3 sm:px-4 sm:pb-10">
	<section
		class="rounded-[var(--radius-card)] border border-dashed border-[var(--c-border)] bg-[var(--c-bg-secondary)] px-4 py-10 text-center sm:px-6 sm:py-14"
		[attr.aria-label]="'Quests page' | translate"
	>
		<div
			class="mx-auto inline-flex h-14 w-14 items-center justify-center rounded-full border border-[var(--c-border)] bg-[var(--c-bg-primary)] text-[var(--c-secondary)]"
		>
			<span class="material-symbols-outlined text-[28px]" aria-hidden="true">explore</span>
		</div>

		<p
			class="mt-4 text-[12px] font-semibold uppercase tracking-[0.18em] text-[var(--c-secondary)]"
			translate
		>
			Quests
		</p>
		<h1 class="mt-2 text-xl font-semibold text-[var(--c-text-secondary)]" translate>
			There are currently no quests
		</h1>
		<p class="mx-auto mt-2 max-w-[28rem] text-sm leading-6 text-[var(--c-text-muted)]" translate>
			Check back later for new activities and special offers.
		</p>
	</section>
</main>
